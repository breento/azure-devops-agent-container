name: Build container image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build-container.yml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build-container.yml
  workflow_dispatch:
  schedule:
    - cron: '17 3 1 * *'

permissions:
  contents: read
  packages: write

env:
  POWERSHELL_VERSION: 7.6.3
  POWERSHELL_SHA256: F03200F25C511583C648AECB8D8CE75789DB2CF668B39803EE639476D716A3DD
  TERRAFORM_VERSION: 1.15.8
  PACKER_VERSION: 1.15.4
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/azure-devops-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY.MM.DD'}}.${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and optionally push container image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            POWERSHELL_VERSION=${{ env.POWERSHELL_VERSION }}
            POWERSHELL_SHA256=${{ env.POWERSHELL_SHA256 }}
            TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
            PACKER_VERSION=${{ env.PACKER_VERSION }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: false
          provenance: false
